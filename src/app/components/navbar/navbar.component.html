<nav class="navbar" aria-label="Library navigation">
  <section class="trending-subjects">
    <div class="nav-actions">
      <button
        id="home-btn"
        class="nav-button"
        type="button"
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <i class="fa fa-home" aria-hidden="true"></i>
        Home
      </button>

      <button id="search-btn" class="nav-button" type="button" (click)="searchSubject()">
        <i class="fa fa-search" aria-hidden="true"></i>
        Search
      </button>
    </div>

    <input
      type="text"
      *ngIf="navSearchBar"
      class="form-control subject-search"
      placeholder="Search subjects"
      [(ngModel)]="term"
    />

    <h2 class="navbar-header">Trending Subjects</h2>

    <ul class="subject-list">
      <li *ngFor="let subject of trendingSubjects | filter: term">
        <a [routerLink]="['/trending-subject', subject.name]" routerLinkActive="active">
          {{ subject.name }}
        </a>
      </li>
    </ul>
  </section>
</nav>
