<div class="library-layout">
  <front-end-internship-assignment-navbar></front-end-internship-assignment-navbar>

  <main class="library-main">
    <header class="header">
      <div>
        <p class="eyebrow">Open Library</p>
        <h1 class="page-title">Open Books Library</h1>
      </div>

      <div class="search-button">
        <mat-icon aria-hidden="true">search</mat-icon>
        <input
          [formControl]="bookSearch"
          name="searchKey"
          type="text"
          placeholder="Search books by title or author"
        />
        <button
          *ngIf="showClearSearchBtn"
          class="clear-search"
          type="button"
          aria-label="Clear search"
          (click)="clearSearch()"
        >
          <i class="fa fa-times" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <section class="content-card">
      <div *ngIf="queryNotFound" class="empty-state">
        <h2>No results found for "{{ query }}"</h2>
        <p>Try another title, author, or subject.</p>
      </div>

      <div *ngIf="!isLoading && !queryNotFound">
        <div *ngIf="showSearchResultsDialogue" class="results-title">
          <h2>Search results for "{{ query }}"</h2>
        </div>

        <front-end-internship-assignment-table-view
          (emitterObj)="paramObj = $event"
          [booksList]="allBooksData"
          [totalRecords]="recordsLength"
          [parametersData]="paramObj"
          [subjectName]="query"
          [currentPage]="currentPage"
        ></front-end-internship-assignment-table-view>

        <div class="paginator">
          <button
            class="paginator__button"
            type="button"
            aria-label="Go to previous page"
            (click)="previousPage()"
            [disabled]="previousBtn"
          >
            <i class="fa fa-angle-left" aria-hidden="true"></i>
            Prev
          </button>

          <div class="paginator__page-size">
            <label for="table-size">Items per page</label>
            <select
              id="table-size"
              class="paginator__select form-control"
              (change)="tableSizeChange($event)"
              [(ngModel)]="tableSize"
            >
              <option *ngFor="let size of tableSizes">{{ size }}</option>
            </select>
          </div>

          <div class="paginator__page-count">Page {{ currentPage + 1 }} of {{ totalPages }}</div>

          <button
            class="paginator__button"
            type="button"
            aria-label="Go to next page"
            (click)="nextPage()"
            [disabled]="nextBtn"
          >
            Next
            <i class="fa fa-angle-right" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </section>
  </main>
</div>
